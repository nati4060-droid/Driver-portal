function findChatAnswer(query, lang) {
  if (!query || !query.trim()) return null;
  const q = query.trim().toLowerCase();
  const kb = CHAT_KB[lang] || CHAT_KB.en;
  let best = null, bestScore = 0;
  for (const item of kb) {
    const score = item.keywords.filter(k => q.includes(k.toLowerCase())).length;
    if (score > bestScore) { bestScore = score; best = item; }
  }
  return bestScore > 0 ? best : null;
}

const DAY_KEYS = ['day_sun','day_mon','day_tue','day_wed','day_thu','day_fri','day_sat'];

function formatDate(isoDate, t) {
  if (!isoDate) return "";
  const [y, m, d] = isoDate.split("-");
  const dt = new Date(`${y}-${m}-${d}T12:00:00`);
  const dayName = t(DAY_KEYS[dt.getDay()]);
  const prefix = t('dayPrefix');
  return `${prefix}${dayName} ${d}/${m}/${y}`;
}

/* Canonical English keys for shiftType — bilingual-safe color lookup */
function shiftColor(type) {
  if (type === "morning")   return { bg: "#FEF3C7", color: "#92400E" };
  if (type === "afternoon") return { bg: "#DBEAFE", color: "#1E40AF" };
  if (type === "night")     return { bg: "#EDE9FE", color: "#5B21B6" };
  if (type === "leave")     return { bg: "#D1FAE5", color: "#065F46" };
  if (type === "standby" || type === "onCall") return { bg: "#F3F4F6", color: "#374151" };
  return { bg: "#F3F4F6", color: "#374151" };
}

/* Canonical English keys for status */
function statusStyle(status) {
  if (status === "approved") return { bg: "#D1FAE5", color: "#065F46", dot: "#10B981" };
  if (status === "rejected") return { bg: "#FEE2E2", color: "#991B1B", dot: "#EF4444" };
  return { bg: "#FEF3C7", color: "#92400E", dot: "#F59E0B" }; // pending
}

function daysBetween(fromIso, toIso) {
  const ms = new Date(`${toIso}T12:00:00`) - new Date(`${fromIso}T12:00:00`);
  return Math.round(ms / 86400000);
}

            border:"2px solid #E5E7EB", fontSize:20, textAlign:"center",

function NewRequestScreen({ onBack, onSubmit }) {
  const { t } = useT();
  const [type, setType] = React.useState("annualLeave");
  const [startDate, setStartDate] = React.useState("");
  const [endDate, setEndDate] = React.useState("");
  const [notes, setNotes] = React.useState("");
  const [errors, setErrors] = React.useState([]);
  const [submitted, setSubmitted] = React.useState(false);

  const rule = REQUEST_RULES[type];

  function validate() {
    const errs = [];
    if (!startDate) errs.push(t('errMissingStart'));
    if (!endDate && type !== "personalDay") errs.push(t('errMissingEnd'));

    const effectiveEnd = type === "personalDay" ? startDate : endDate;

    if (startDate && daysBetween(DEMO_TODAY, startDate) < 0)
      errs.push(t('errPastStart'));

    if (startDate && effectiveEnd && daysBetween(startDate, effectiveEnd) < 0)
      errs.push(t('errEndBeforeStart'));

    if (startDate && daysBetween(DEMO_TODAY, startDate) >= 0 &&
        daysBetween(DEMO_TODAY, startDate) < rule.minNoticeDays)
      errs.push(t('errNoticeTpl')(t('reqType_' + type), rule.minNoticeDays));

    return errs;
  }

  function handleSubmit() {
    const errs = validate();
    setErrors(errs);
    if (errs.length > 0) return;
    onSubmit({
      type, startDate,
      endDate: type === "personalDay" ? startDate : endDate,
      notes,
    });
    setSubmitted(true);
  }

  const labelStyle = { fontSize:13, color:"#555", display:"block", marginBottom:6, fontWeight:600 };
  const inputStyle = {
    width:"100%", padding:"12px 14px", borderRadius:12,
    border:"2px solid #E5E7EB", fontSize:15, outline:"none", marginBottom:14,
    background:"#fff", color:"#1a1a1a"
  };

  if (submitted) {
    return (
      <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32, textAlign:"center" }}>
        <div style={{ fontSize:48, marginBottom:14 }}>✅</div>
        <div style={{ fontSize:19, fontWeight:800, color:"#1a1a1a", marginBottom:6 }}>{t('nrSuccessTitle')}</div>
        <div style={{ fontSize:13, color:"#666", marginBottom:24, lineHeight:1.6 }}
             dangerouslySetInnerHTML={{ __html: t('nrSuccessBody') }} />
        <button onClick={onBack} style={{
          padding:"12px 28px", background:"#1E40AF", color:"#fff",
          border:"none", borderRadius:12, fontSize:15, fontWeight:700, cursor:"pointer"
        }}>
          {t('nrBackToRequests')}
        </button>
      </div>
    );
  }

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
      <div style={{
        background:"#fff", padding:"14px 16px", borderBottom:"1px solid #eee",
        display:"flex", alignItems:"center", gap:12
      }}>
        <button onClick={onBack} style={{
          background:"none", border:"none", fontSize:22, cursor:"pointer", color:"#1E40AF"
        }}>←</button>
        <div style={{ fontSize:17, fontWeight:700, color:"#1a1a1a" }}>{t('newRequestTitle')}</div>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"16px" }}>
        <label style={labelStyle}>{t('nrType')}</label>
        <select value={type} onChange={e => { setType(e.target.value); setErrors([]); }} style={inputStyle}>
          {Object.keys(REQUEST_RULES).map(k => <option key={k} value={k}>{t('reqType_' + k)}</option>)}
        </select>

        <div style={{
          padding:"8px 12px", background:"#EFF6FF", borderRadius:10,
          fontSize:12, color:"#1E40AF", marginBottom:14, marginTop:-6
        }}>
          ℹ️ {t('reqRule_' + type)}
        </div>

        <label style={labelStyle}>{type === "personalDay" ? t('nrDate') : t('nrFromDate')}</label>
        <input type="date" value={startDate} min={DEMO_TODAY}
          onChange={e => setStartDate(e.target.value)} style={inputStyle} />

        {type !== "personalDay" && (
          <>
            <label style={labelStyle}>{t('nrToDate')}</label>
            <input type="date" value={endDate} min={startDate || DEMO_TODAY}
              onChange={e => setEndDate(e.target.value)} style={inputStyle} />
          </>
        )}

        <label style={labelStyle}>{t('nrNotes')}</label>
        <textarea value={notes} onChange={e => setNotes(e.target.value)}
          placeholder={t('nrNotesPlaceholder')}
          rows={3}
          style={{ ...inputStyle, resize:"none", fontFamily:"inherit" }} />

        {errors.length > 0 && (
          <div style={{
            background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:12,
            padding:"10px 14px", marginBottom:14
          }}>
            {errors.map((e, i) => (
              <div key={i} style={{ color:"#991B1B", fontSize:13, marginBottom: i < errors.length-1 ? 4 : 0 }}>
                ✗ {e}
              </div>
            ))}
          </div>
        )}

        <button onClick={handleSubmit} style={{
          width:"100%", padding:"14px 0",
          background:"#1E40AF", color:"#fff", border:"none", borderRadius:14,
          fontSize:16, fontWeight:700, cursor:"pointer"
        }}>
          {t('nrSubmit')}
        </button>
        <div style={{ fontSize:11, color:"#9CA3AF", textAlign:"center", marginTop:10 }}>
          {t('nrFooter')}
        </div>
      </div>
    </div>
  );
}

function ManagerScreen({ requests, driverName, onBack, onDecide }) {
  const { t } = useT();
  const [rejectingId, setRejectingId] = React.useState(null);
  const [rejectReason, setRejectReason] = React.useState("");

  const pending = requests.filter(r => r.status === "pending");
  const decided = requests.filter(r => r.status !== "pending");

  function approve(id) {
    onDecide(id, "approved", t('mgrApproveDecision'));
  }
  function reject(id) {
    if (!rejectReason.trim()) return;
    onDecide(id, "rejected", rejectReason.trim());
    setRejectingId(null);
    setRejectReason("");
  }

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column" }}>
      <div style={{
        background:"linear-gradient(135deg, #374151, #111827)",
        padding:"14px 16px", display:"flex", alignItems:"center", gap:12, color:"#fff"
      }}>
        <button onClick={onBack} style={{
          background:"none", border:"none", fontSize:22, cursor:"pointer", color:"#fff"
        }}>←</button>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:17, fontWeight:700 }}>{t('mgrTitle')}</div>
          <div style={{ fontSize:12, opacity:0.7 }}>{t('mgrSub')}</div>
        </div>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"14px 16px" }}>
        <div style={{ fontSize:13, fontWeight:700, color:"#555", marginBottom:10 }}>
          {t('mgrPending')} ({pending.length})
        </div>

        {pending.length === 0 && (
          <div style={{ textAlign:"center", padding:24, color:"#9CA3AF", fontSize:13 }}>
            {t('mgrEmpty')}
          </div>
        )}

        {pending.map(r => (
          <div key={r.id} style={{
            background:"#fff", borderRadius:14, padding:"12px 14px", marginBottom:10,
            border:"1px solid #E5E7EB"
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontWeight:700, fontSize:14, color:"#1a1a1a" }}>{t('reqType_' + r.type)} — {driverName}</div>
                <div style={{ color:"#555", fontSize:13, marginTop:2 }}>
                  {formatDate(r.startDate, t)}{r.endDate !== r.startDate && ` — ${formatDate(r.endDate, t)}`}
                </div>
                {r.notes && <div style={{ color:"#888", fontSize:12, marginTop:2 }}>{t('notesPrefix')} {r.notes}</div>}
              </div>
              <StatusChip status={r.status} />
            </div>

            {rejectingId === r.id ? (
              <div style={{ marginTop:10 }}>
                <input
                  value={rejectReason}
                  onChange={e => setRejectReason(e.target.value)}
                  placeholder={t('mgrRejectPlaceholder')}
                  style={{
                    width:"100%", padding:"10px 12px", borderRadius:10,
                    border:"2px solid #FECACA", fontSize:13, outline:"none", marginBottom:8
                  }}
                />
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => reject(r.id)} disabled={!rejectReason.trim()} style={{
                    flex:1, padding:"10px 0", borderRadius:10, border:"none",
                    background: rejectReason.trim() ? "#DC2626" : "#FCA5A5",
                    color:"#fff", fontWeight:700, fontSize:13,
                    cursor: rejectReason.trim() ? "pointer" : "default"
                  }}>{t('mgrConfirmReject')}</button>
                  <button onClick={() => { setRejectingId(null); setRejectReason(""); }} style={{
                    padding:"10px 14px", borderRadius:10, border:"1px solid #E5E7EB",
                    background:"#fff", color:"#555", fontSize:13, cursor:"pointer"
                  }}>{t('mgrCancel')}</button>
                </div>
              </div>
            ) : (
              <div style={{ display:"flex", gap:8, marginTop:10 }}>
                <button onClick={() => approve(r.id)} style={{
                  flex:1, padding:"10px 0", borderRadius:10, border:"none",
                  background:"#16A34A", color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer"
                }}>{t('mgrApproveBtn')}</button>
                <button onClick={() => setRejectingId(r.id)} style={{
                  flex:1, padding:"10px 0", borderRadius:10, border:"1px solid #FECACA",
                  background:"#FEF2F2", color:"#DC2626", fontWeight:700, fontSize:13, cursor:"pointer"
                }}>{t('mgrRejectBtn')}</button>
              </div>
            )}
          </div>
        ))}

        {decided.length > 0 && (
          <>
            <div style={{ fontSize:13, fontWeight:700, color:"#555", margin:"16px 0 10px" }}>
              {t('mgrDecided')}
            </div>
            {decided.map(r => (
              <div key={r.id} style={{
                background:"#fff", borderRadius:12, padding:"10px 14px", marginBottom:8,
                border:"1px solid #E5E7EB", display:"flex",
                justifyContent:"space-between", alignItems:"center", opacity:0.75
              }}>
                <div style={{ fontSize:13, color:"#444" }}>
                  {t('reqType_' + r.type)} · {formatDate(r.startDate, t)}
                </div>
                <StatusChip status={r.status} />
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

function ChatScreen({ onBack }) {
  const { t, lang } = useT();
  const [messages, setMessages] = React.useState([]);
  const [input, setInput] = React.useState("");
  const [thinking, setThinking] = React.useState(false);
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, thinking]);

  function send(text) {
    const q = (text != null ? text : input).trim();
    if (!q || thinking) return;
    setMessages(prev => [...prev, { role:"user", text:q }]);
    setInput("");
    setThinking(true);

    setTimeout(() => {
      const answer = findChatAnswer(q, lang);
      const reply = answer
        ? { role:"assistant", text:answer.answer, source:answer.source, tags:answer.tags }
        : { role:"assistant", fallback:true, text: t('chatNoAnswer') };
      setMessages(prev => [...prev, reply]);
      setThinking(false);
    }, 600);
  }

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:"#F1F5F9" }}>
      {/* Header */}
      <div style={{
        background:"#fff", padding:"12px 16px", borderBottom:"1px solid #E5E7EB",
        display:"flex", alignItems:"center", gap:12
      }}>
        {onBack && (
          <button onClick={onBack} style={{
            background:"none", border:"none", fontSize:22, cursor:"pointer", color:"#1E40AF"
          }}>←</button>
        )}
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ fontSize:16, fontWeight:700, color:"#1a1a1a" }}>{t('chatTitle')}</div>
            <span style={{
              fontSize:10, padding:"2px 7px", background:"#FEF3C7",
              color:"#92400E", borderRadius:6, fontWeight:700
            }}>{t('chatPhase')}</span>
          </div>
          <div style={{ fontSize:11, color:"#9CA3AF", marginTop:2 }}>
            {t('chatBasedOn')}
          </div>
        </div>
      </div>

      {/* Disclaimer */}
      <div style={{
        background:"#FFFBEB", borderBottom:"1px solid #FDE68A",
        padding:"8px 16px", fontSize:11, color:"#92400E",
        display:"flex", alignItems:"center", gap:6
      }}>
        {t('chatDisclaimer')}
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{ flex:1, overflowY:"auto", padding:"16px" }}>
        {messages.length === 0 && (
          <div>
            <div style={{ textAlign:"center", padding:"20px 0 24px" }}>
              <div style={{ fontSize:36, marginBottom:8 }}>🚆</div>
              <div style={{ fontSize:15, fontWeight:700, color:"#1a1a1a", marginBottom:4 }}>
                {t('chatGreet')}
              </div>
              <div style={{ fontSize:12, color:"#6B7280" }}>
                {t('chatGreetSub')}
              </div>
            </div>
            <div style={{ fontSize:11, fontWeight:700, color:"#6B7280", marginBottom:8, textTransform:"uppercase", letterSpacing:0.5 }}>
              {t('chatSuggestedTitle')}
            </div>
            {(CHAT_SUGGESTED[lang] || CHAT_SUGGESTED.en).map((q, i) => (
              <SuggestedQuestion key={i} text={q} onClick={() => send(q)} />
            ))}
          </div>
        )}

        {messages.map((m, i) => <ChatBubble key={i} msg={m} />)}

        {thinking && (
          <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:12 }}>
            <div style={{
              background:"#fff", padding:"12px 16px",
              borderRadius:"14px 14px 4px 14px",
              border:"1px solid #E5E7EB", color:"#9CA3AF",
              fontSize:13, display:"flex", gap:4
            }}>
              <span style={{ animation:"pulse 1s infinite" }}>●</span>
              <span style={{ animation:"pulse 1s infinite 0.2s" }}>●</span>
              <span style={{ animation:"pulse 1s infinite 0.4s" }}>●</span>
            </div>
          </div>
        )}
      </div>

      {/* Input */}
      <div style={{
        background:"#fff", padding:"10px 12px", borderTop:"1px solid #E5E7EB",
        display:"flex", gap:8
      }}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") send(); }}
          placeholder={t('chatPlaceholder')}
          style={{
            flex:1, padding:"11px 14px", borderRadius:12,
            border:"1px solid #E5E7EB", fontSize:14, outline:"none",
            background:"#F9FAFB"
          }}
        />
        <button onClick={() => send()} disabled={!input.trim() || thinking} style={{
          padding:"0 18px", background: input.trim() && !thinking ? "#1E40AF" : "#D1D5DB",
          color:"#fff", border:"none", borderRadius:12, fontSize:14, fontWeight:700,
          cursor: input.trim() && !thinking ? "pointer" : "default"
        }}>
          {t('chatSend')}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
 * App shell — device toggle + language toggle
 * ═══════════════════════════════════════════════════════════════════════════ */

function PhoneFrame({ children }) {

      width:375, minHeight:740,
      background:"#F8F9FA", borderRadius:40,
      border:"3px solid #1a1a1a",
      boxShadow:"0 25px 60px rgba(0,0,0,0.15), inset 0 0 0 2px #333",
      overflow:"hidden", position:"relative",
      display:"flex", flexDirection:"column"
    }}>
      {/* Notch */}
      <div style={{
        height:44, background:"#fff",
        display:"flex", alignItems:"center", justifyContent:"center",
        borderBottom:"1px solid #f0f0f0", flexShrink:0
      }}>
        <div style={{ width:110, height:24, background:"#1a1a1a", borderRadius:12 }} />
      </div>
      {children}
    </div>

}

function TabletFrame({ children, driverName, currentShift }) {
  const { t } = useT();
  return (
    <div style={{
      width:"100%", maxWidth:720, minHeight:520,
      background:"#0F172A", borderRadius:24,
      border:"6px solid #1a1a1a",
      boxShadow:"0 25px 60px rgba(0,0,0,0.2), inset 0 0 0 2px #333",
      overflow:"hidden", position:"relative",
      display:"flex", flexDirection:"column"
    }}>
      {/* Cabin status strip */}
      <div style={{
        height:28, background:"#000",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"0 14px", color:"#9CA3AF", fontSize:11, flexShrink:0,
        borderBottom:"1px solid #1F2937"
      }}>
        <span style={{ display:"flex", alignItems:"center", gap:6 }}>
          <span style={{ width:7, height:7, borderRadius:4, background:"#10B981" }} />
          {t('tabletStripLabel')} · {t('tabletDriver')}: {driverName || "—"} {currentShift != null && `· ${t('tabletShift')} #${currentShift}`}
        </span>
        <span style={{ fontFamily:"monospace" }}>14:23 · {t('tabletPassenger')}</span>

function DeviceToggle({ device, onChange }) {
  const { t } = useT();
  const opts = [
    { id:"phone",  label: t('devicePhone'),  sub: t('devicePhoneSub') },
    { id:"tablet", label: t('deviceTablet'), sub: t('deviceTabletSub') }
  ];
  return (
    <div style={{
      display:"flex", flexDirection:"column", alignItems:"center",
      padding:"16px 12px 4px", gap:6
    }}>
      <div style={{
        display:"inline-flex", background:"#fff", borderRadius:14,
        padding:4, border:"1px solid #E5E7EB",
        boxShadow:"0 1px 3px rgba(0,0,0,0.04)"
      }}>
        {opts.map(opt => (
          <button key={opt.id} onClick={() => onChange(opt.id)} style={{
            padding:"8px 16px", border:"none", borderRadius:10, cursor:"pointer",
            background: device===opt.id ? "#1E40AF" : "transparent",
            color: device===opt.id ? "#fff" : "#374151",
            fontWeight:700, fontSize:13, transition:"all 0.15s",
            minWidth:140, textAlign:"center"
          }}>
            <div>{opt.label}</div>
            <div style={{
              fontSize:10, opacity: device===opt.id ? 0.85 : 0.55,
              marginTop:2, fontWeight:500
            }}>{opt.sub}</div>
          </button>
        ))}
      </div>
      <div style={{ fontSize:11, color:"#9CA3AF", textAlign:"center", maxWidth:520 }}>
        {t('deviceChannelNote')}
      </div>
    </div>
  );
}

function LangToggle({ lang, onChange }) {
  const opts = [
    { id: 'en', label: 'EN', full: 'English' },
    { id: 'he', label: 'HE', full: 'עברית' }
  ];
  return (
    <div style={{
      display:"flex", flexDirection:"column", alignItems:"center",
      padding:"20px 12px 6px", gap:6
    }}>
      <div style={{
        display:"inline-flex", background:"#fff", borderRadius:14,
        padding:4, border:"1px solid #E5E7EB",
        boxShadow:"0 2px 8px rgba(15, 23, 42, 0.06)"
      }}>
        {opts.map(opt => (
          <button
            key={opt.id}
            onClick={() => onChange(opt.id)}
            aria-pressed={lang === opt.id}
            style={{
              padding:"10px 22px", border:"none", borderRadius:10, cursor:"pointer",
              background: lang===opt.id ? "#0F172A" : "transparent",
              color: lang===opt.id ? "#fff" : "#374151",
              fontWeight:800, fontSize:14, transition:"all 0.15s",
              fontFamily:"'JetBrains Mono', monospace", letterSpacing:"0.1em",
              minWidth:64
            }}
          >
            {opt.label}
          </button>
        ))}
      </div>
      <div style={{ fontSize:10, color:"#9CA3AF", letterSpacing:"0.08em", textTransform:"uppercase", fontWeight:600 }}>
        Language · שפה
      </div>
    </div>
  );
}

function PhoneApp({ data }) {
  const [screen, setScreen] = React.useState("login");
  const [homeData, setHomeData] = React.useState(null);
  const [requests, setRequests] = React.useState(data.requests);

  /* When language switches, swap demo home + history but keep request state */
  React.useEffect(() => {
    setRequests(prev => {
      // Re-translate request notes/decisionNotes if they were the originals
      return prev.map(r => {
        const origMatch = data.requests.find(o => o.id === r.id);
        if (origMatch) {
          return {
            ...r,
            notes: r.notes === origMatch.notes ? origMatch.notes : r.notes,
            decisionNote: r.decisionNote === origMatch.decisionNote ? origMatch.decisionNote : r.decisionNote,
            approver: r.approver === origMatch.approver ? origMatch.approver : r.approver
          };
        }
        return r;
      });
    });
  }, [data]);

  const pendingCount = requests.filter(r => r.status === "pending").length;
  const { t } = useT();

  function handleLogin(d) { setHomeData(d); setScreen("home"); }
  function handleLogout() { setHomeData(null); setScreen("login"); }

  function handleNewRequest(req) {
    setRequests(prev => [{
      ...req,
      id: Math.max(0, ...prev.map(r => r.id)) + 1,
      status: "pending", createdAt: DEMO_TODAY,
      approver: null, decisionNote: null,
    }, ...prev]);
  }

  function handleDecide(id, status, decisionNote) {
    setRequests(prev => prev.map(r =>
      r.id === id
        ? { ...r, status, decisionNote, approver: t('mgrManagerName') }
        : r
    ));
  }

  return (
    <PhoneFrame>
      {screen === "login" && <LoginScreen onLogin={handleLogin} defaultHome={data.home} />}
      {screen === "home" && homeData && (
        <HomeScreen
          homeData={data.home}
          pendingCount={pendingCount}
          onHistory={() => setScreen("history")}
          onRequests={() => setScreen("requests")}
          onManager={() => setScreen("manager")}
          onLogout={handleLogout}
        />
      )}
      {screen === "history" && homeData && (
        <HistoryScreen
          historyData={data.history}
          driverName={data.home.driver.name}
          onBack={() => setScreen("home")}
        />
      )}
      {screen === "requests" && homeData && (
        <RequestsScreen
          requests={requests}
          driverName={data.home.driver.name}
          onBack={() => setScreen("home")}
          onNewRequest={() => setScreen("newRequest")}
        />
      )}
      {screen === "newRequest" && homeData && (
        <NewRequestScreen
          onBack={() => setScreen("requests")}
          onSubmit={handleNewRequest}
        />
      )}
      {screen === "manager" && homeData && (
        <ManagerScreen
          requests={requests}
          driverName={data.home.driver.name}
          onBack={() => setScreen("home")}
          onDecide={handleDecide}
        />
      )}
    </PhoneFrame>
  );
}

function TabletApp({ data }) {
  const driver = data.home.driver;
  const shift = data.home.today;

  return (
    <TabletFrame driverName={driver.name} currentShift={shift && shift.num}>
      {shift && <ActiveShiftStrip shift={shift} />}
      <ChatScreen />
    </TabletFrame>
  );
}

function ActiveShiftStrip({ shift }) {
  const { t } = useT();
  return (
    <div style={{
      padding:"10px 16px", background:"#fff",
      borderBottom:"1px solid #E5E7EB",
      display:"flex", alignItems:"center", justifyContent:"space-between",
      flexShrink:0
    }}>
      <div style={{ fontSize:13, color:"#374151" }}>
        <span style={{ fontWeight:700 }}>{t('tabletActiveShift')}</span>
        <span style={{ color:"#9CA3AF" }}> · {shift.start}–{shift.end} · </span>
        <span>{shift.stationStart} → {shift.stationEnd}</span>
      </div>
      <div style={{ display:"flex", gap:4, direction:"ltr" }}>
        {(shift.trains || []).slice(0,3).map((tr,i) => (
          <span key={i} style={{
            fontSize:11, fontWeight:700, padding:"2px 8px",
            background:"#EFF6FF", color:"#1E40AF", borderRadius:6,
            fontFamily:"monospace"
          }}>{tr}</span>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [lang, setLang] = React.useState(() => {
    try {
      const stored = localStorage.getItem('siteLang');
      if (stored === 'he' || stored === 'en') return stored;
    } catch (e) {}
    return 'en';
  });
  const [device, setDevice] = React.useState("phone");

  React.useEffect(() => {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
    try { localStorage.setItem('siteLang', lang); } catch (e) {}
  }, [lang]);

  const ctx = React.useMemo(() => ({
    lang,
    t: (k) => {
      const v = I18N[lang][k];
      return v !== undefined ? v : k;
    }
  }), [lang]);

  const data = DEMO_DATA[lang];

  return (
    <LangContext.Provider value={ctx}>
      <div style={{ position:"relative", minHeight:"100vh" }}>
        <LangToggle lang={lang} onChange={setLang} />
        <DeviceToggle device={device} onChange={setDevice} />
        <div style={{
          display:"flex", justifyContent:"center",
          padding:"12px 16px 24px", alignItems:"flex-start"
        }}>
          {device === "phone" ? <PhoneApp data={data} /> : <TabletApp data={data} />}
        </div>
      </div>
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
